name = "mistmall-api"
main = "worker/index.ts"
workers_dev = false
preview_urls = false
compatibility_date = "2025-01-01"

[vars]
ALLOWED_ORIGINS = "http://localhost:5173,https://mistmall-clean-b.pages.dev"
# TURNSTILE_SECRET_KEY: wrangler secret put TURNSTILE_SECRET_KEY (local: 1x0000000000000000000000000000000AA)
# CF_ACCESS_TEAM_DOMAIN: yourteam.cloudflareaccess.com (Zero Trust > Access > Applications)
# CF_ACCESS_AUD: Application AUD from Access policy (e.g. 1234567890abcdef)
# DEV_BYPASS_ACCESS: "true" for local only - skips Access JWT when host is localhost
# DEV_BYPASS_TURNSTILE: "true" for local only - skips Turnstile when host is localhost
DEV_BYPASS_ACCESS = "true"
DEV_BYPASS_TURNSTILE = "true"
# 後台登入密碼雜湊（禁止明文）：
# 格式：pbkdf2$sha256$<iterations>$<salt_base64>$<hash_base64>
# 產生方式：node ./tools/gen-admin-password-hash.mjs
# ADMIN_PASSWORD_HASH = "pbkdf2$sha256$210000$...$..."

[[d1_databases]]
binding = "DB"
database_name = "mistmall-api"
database_id = "427c4c4d-43d2-4037-8e4f-d3b1d9418357"
migrations_dir = "migrations"
